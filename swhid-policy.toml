# SWHID Verification Tool - Compliance Policy
# This file configures the policy engine for CI/CD gatekeeping.

[policy]
# Fail the build if any local file/directory has a cryptographic mismatch against the archive
fail_on_mismatch = true

# The minimum confidence level required for dependencies.
# We allow "Partial" to account for Software Heritage archival lag of newly installed packages.
minimum_confidence_level = "Partial"

# Do not fail on vulnerabilities by default (reporting only)
fail_on_vulnerability = false

# Allowlist for private or internal packages
allowlist = []

# Vulnerability IDs to ignore (e.g. cryptography bundled OpenSSL issues, python-multipart in test venv)
ignored_vulnerabilities = [
  "GHSA-537c-gmf6-5ccf",
  "GHSA-r6ph-v2qm-q3c2",
  "GHSA-59g5-xgcq-4qw3",
  "GHSA-5rvq-cxj2-64vf",
  "GHSA-pp6c-gr5w-3c5g",
  "GHSA-wp53-j4wj-2cfg"
]
