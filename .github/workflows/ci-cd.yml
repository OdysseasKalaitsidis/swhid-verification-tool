name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: write
  id-token: write

jobs:
  test-and-audit:
    name: Test and Audit
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[test,dev]"

    - name: Lint with ruff
      run: ruff check .

    - name: Type check with mypy
      run: mypy swhid_tool/

    - name: Test with pytest
      run: pytest tests/

    - name: Run Self-Audit
      run: |
        # Run our own audit command on the repository
        python -m swhid_tool.cli audit

  release:
    name: Auto Release
    needs: test-and-audit
    # Only run on push to main (not on pull requests)
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build semver

    - name: Determine Next Version
      id: next_version
      run: |
        git fetch --tags
        LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.1.1")
        echo "Latest tag: $LATEST_TAG"
        
        VERSION_NUM=${LATEST_TAG#v}
        
        # Use python semver to bump the patch version
        NEXT_VERSION=$(python -c "import semver; ver = semver.VersionInfo.parse('$VERSION_NUM'); print(ver.bump_patch())")
        echo "Next version: v$NEXT_VERSION"
        
        echo "version=v$NEXT_VERSION" >> $GITHUB_OUTPUT
        echo "version_raw=$NEXT_VERSION" >> $GITHUB_OUTPUT

    - name: Bump Version in Files
      run: |
        # Update pyproject.toml and __init__.py with the new version before building
        sed -i 's/version = "[0-9\.]*"/version = "${{ steps.next_version.outputs.version_raw }}"/' pyproject.toml
        sed -i 's/__version__ = "[0-9\.]*"/__version__ = "${{ steps.next_version.outputs.version_raw }}"/' swhid_tool/__init__.py

    - name: Build Package
      run: python -m build

    - name: Create Git Tag and Push
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        git tag -a ${{ steps.next_version.outputs.version }} -m "Release ${{ steps.next_version.outputs.version }} [skip ci]"
        git push origin ${{ steps.next_version.outputs.version }}

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.next_version.outputs.version }}
        name: Release ${{ steps.next_version.outputs.version }}
        body: |
          Automated release generated by CI/CD pipeline.
          
          ### Changes in this release
          - All tests passed.
          - SWHID dependency self-audit passed.
        draft: false
        prerelease: false

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
